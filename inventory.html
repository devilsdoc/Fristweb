  ];

  const grid = document.getElementById('inventory-grid');
  const tmpl = document.getElementById('card-template');
  const search = document.getElementById('search');
  const filterYear = document.getElementById('filter-year');

  function render(list){
    grid.innerHTML = '';
    if(list.length===0){
      grid.innerHTML = '<p class="muted">No cars match your search.</p>';
      return;
    }
    list.forEach(car => {
      const node = tmpl.content.cloneNode(true);
      node.querySelector('.card').id = car.id;
      node.querySelector('.card-img').src = car.img;
      node.querySelector('.car-title').textContent = car.title + ' — ' + car.year;
      node.querySelector('.car-sub').textContent = car.desc + ' • ' + car.miles.toLocaleString() + ' miles';
      node.querySelector('.details').addEventListener('click', ()=>{
        alert(`${car.title}\\n\\n${car.desc}\\nYear: ${car.year}\\nMiles: ${car.miles}\\nTags: ${car.tags.join(', ')}`);
      });
      grid.appendChild(node);
    });
  }

  function matchesFilter(car, q, yearGroup){
    const hay = (car.title + ' ' + car.year + ' ' + car.tags.join(' ')).toLowerCase();
    if(q && !hay.includes(q)) return false;
    if(yearGroup){
      if(yearGroup==='1950s' && !(car.year>=1950 && car.year<1960)) return false;
      if(yearGroup==='1960s' && !(car.year>=1960 && car.year<1970)) return false;
      if(yearGroup==='1970s' && !(car.year>=1970 && car.year<1980)) return false;
      if(yearGroup==='1980s' && !(car.year>=1980 && car.year<1990)) return false;
    }
    return true;
  }

  function applyFilters(){
    const q = search.value.trim().toLowerCase();
    const year = filterYear.value;
    const filtered = inventory.filter(c=>matchesFilter(c,q,year));
    render(filtered);
  }

  search.addEventListener('input', applyFilters);
  filterYear.addEventListener('change', applyFilters);

  render(inventory);
  </script>
